<script>
  const content = {
    pt: {
      title: 'Lucas Calabró Berti',
      subtitle: 'Cientista Político • Pesquisador',
      nav: {
        home: 'Sobre mim',
        education: 'Formação',
        academic: 'Atuação Acadêmica',
        publications: 'Publicações',
        projects: 'Projetos',
        contact: 'Contato'
      },
      aboutTitle: 'Sobre mim',
      about1: 'Olá, bem-vindo(a)! Me chamo Lucas Calabró Berti, sou mestrando em Ciência Política no IESP/UERJ e bacharel em Ciência Política pela UNIRIO. Pesquiso e escrevo sobre política brasileira e sul-americana, instituições e comportamento político, com ênfase em presidencialismo, estudos legislativos, relações Executivo-Legislativo e coalizões de governo.',
      about2: 'Atualmente pesquiso no Observatório Político Sul-Americano (OPSA/IESP), no Núcleo de Estudos sobre o Congresso (NECON/IESP) e no Grupo de Relações Internacionais e Sul Global (GRISUL/UNIRIO). Também sou editor do Conjuntura Latitude Sul, periódico mensal do OPSA, onde escrevo sobre política peruana.',
      contact: 'Contato',
      languages: '🌐 Idiomas: Inglês (fluente), Francês e Espanhol (avançados), Italiano (intermediário)'
    },
    en: {
      title: 'Lucas Calabró Berti',
      subtitle: 'Political Scientist • Researcher',
      nav: {
        home: 'About',
        education: 'Education',
        academic: 'Academic Experience',
        publications: 'Publications',
        projects: 'Projects',
        contact: 'Contact'
      },
      aboutTitle: 'About',
      about1: 'Hello, welcome! My name is Lucas Calabró Berti. I am currently pursuing my Master\'s degree in Political Science at IESP-UERJ and hold a BA in Political Science from UNIRIO. My research focuses on Brazilian and South American politics, institutions, and political behavior, especially presidentialism, legislative studies, executive-legislative relations, and governing coalitions.',
      about2: 'I am currently affiliated with the South American Political Observatory (OPSA/IESP), the Congress Studies Group (NECON/IESP), and the Global South and International Relations Group (GRISUL/UNIRIO). I also serve as editor of the monthly journal Conjuntura Latitude Sul (OPSA), where I write about Peruvian politics.',
      contact: 'Contact',
      languages: '🌐 Languages: English (fluent), French & Spanish (advanced), Italian (intermediate)'
    }
  };

  let currentLang = 'pt';
  const langToggle = document.getElementById('lang-toggle');
  const backToTop = document.getElementById('back-to-top');

  function applyLanguage(langKey) {
    const langData = content[langKey];
    if (!langData) return;

    document.getElementById('title').innerText = langData.title;
    document.getElementById('subtitle').innerText = langData.subtitle;

    document.getElementById('nav-home').innerText = langData.nav.home;
    document.getElementById('nav-education').innerText = langData.nav.education;
    document.getElementById('nav-academic').innerText = langData.nav.academic;
    document.getElementById('nav-publications').innerText = langData.nav.publications;
    document.getElementById('nav-projects').innerText = langData.nav.projects;

    const navContact = document.getElementById('nav-contact');
    if (navContact) {
      navContact.innerText = langData.nav.contact;
    }

    document.getElementById('about-title').innerText = langData.aboutTitle;
    document.getElementById('about-text1').innerText = langData.about1;
    document.getElementById('about-text2').innerText = langData.about2;
    document.getElementById('contact-title').innerText = langData.contact;
    document.getElementById('languages').innerText = langData.languages;

    langToggle.innerText = langKey === 'pt' ? 'EN' : 'PT';
  }

  window.addEventListener('scroll', () => {
    backToTop.classList.toggle('visible', window.scrollY > 500);
  });

  backToTop.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  langToggle.addEventListener('click', () => {
    currentLang = currentLang === 'pt' ? 'en' : 'pt';
    applyLanguage(currentLang);
  });

  applyLanguage(currentLang);
</script>
